<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="assets/img/favicon.png" rel="icon">
    <title>Login</title>
    <script>
        function myFunction(){
            var un = document.forms["myForm"]["Uname"].value;
            var pw = document.forms["myForm"]["Pass"].value; 
            if(un=="skks1991" && pw=="113475"){
                window.location.href="main.html";
            }
            else{
                alert("Invalid Username and Password");
            }


        }
    </script>
    <style>
        body{
            background: #ffcc00;
        }
        .div1{
           width: 350px;
           margin: auto;
           margin: 10 0 0 450px;
           overflow: hidden;
           padding: 75px;
           background: #003300; 
        }
        label{
            color: white;
            padding-left: 10px;
        }
        .inputText{
            width: 300px;
            height: 30px;
            border: none;
            border-radius: 2px;
            padding-left: 8px;
        }
        #logButton{
            width: 300px;
            height: 30px;
            border: none;
            border-radius: 10px;
            padding-left: 7px;
            color: black;
            font-size: 16px;
        }
        @media (max-width: 700px){
          .div1 {
            display: block;
            width: 48%;
            margin: 0 auto;
          }
          .input_uname .input_pass{
            width: 100%;
          }
          #logButton{
            width: 100%;
          }
        }
    </style>
</head>
<body>
    <div class="div1">
        <form name="myForm" method="post">
            <label>UserName</label>
            <input class="input_uname" type="text" name="Uname" class="inputText" placeholder="User Name">
            <br><br>
            <label>Password</label>
            <input class="input_pass" type="password" name="Pass" class="inputText" placeholder="Password">
            <br><br>
            <input class="input_btn" type="button" name="log" id="logButton" value="Login" onclick="myFunction()">
            <br><br>
        </form>
    </div>
</body>
</html>
